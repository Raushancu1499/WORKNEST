services:
  - type: web
    name: worknest-api-raushancu1499
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_JWT_SECRET
        sync: false
